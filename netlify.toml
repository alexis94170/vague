[build]
  command = "rm -rf node_modules package-lock.json .next && npm install --include=optional --no-audit --no-fund && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_FLAGS = "--include=optional"

[[plugins]]
  package = "@netlify/plugin-nextjs"
